<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ Quick Sniff</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --yellow: #f5ff00;
      --pink:   #ff00cc;
      --cyan:   #00ffee;
      --bg:     #06000f;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Press Start 2P', monospace;
      background: var(--bg);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ── CRT Scanlines ───────────────────────────────────────── */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.18) 3px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 200;
    }

    /* ── Vignette ────────────────────────────────────────────── */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
      z-index: 199;
    }

    /* ── Corner brackets ─────────────────────────────────────── */
    .bracket {
      position: fixed;
      width: 36px;
      height: 36px;
      pointer-events: none;
      z-index: 50;
    }
    .bracket-tl { top: 18px; left: 18px; border-top: 2px solid var(--pink); border-left: 2px solid var(--pink); }
    .bracket-tr { top: 18px; right: 18px; border-top: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }
    .bracket-bl { bottom: 18px; left: 18px; border-bottom: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
    .bracket-br { bottom: 18px; right: 18px; border-bottom: 2px solid var(--pink); border-right: 2px solid var(--pink); }

    /* ── Starfield canvas ────────────────────────────────────── */
    #canvas { position: fixed; inset: 0; z-index: 0; }

    /* ── Rotating diamonds ───────────────────────────────────── */
    .diamond-ring {
      position: fixed;
      top: 50%;
      left: 50%;
      border-radius: 4px;
      pointer-events: none;
      z-index: 1;
    }
    .dr1 {
      width: 520px; height: 520px;
      margin: -260px 0 0 -260px;
      border: 1px solid rgba(245,255,0,0.09);
      transform: rotate(45deg);
      animation: spinCW 25s linear infinite;
    }
    .dr2 {
      width: 360px; height: 360px;
      margin: -180px 0 0 -180px;
      border: 1px solid rgba(255,0,204,0.12);
      transform: rotate(45deg);
      animation: spinCCW 16s linear infinite;
    }
    .dr3 {
      width: 200px; height: 200px;
      margin: -100px 0 0 -100px;
      border: 1px solid rgba(0,255,238,0.15);
      transform: rotate(45deg);
      animation: spinCW 10s linear infinite;
    }
    @keyframes spinCW  { to { transform: rotate(405deg); } }
    @keyframes spinCCW { to { transform: rotate(-315deg); } }

    /* ── Equalizer ───────────────────────────────────────────── */
    .equalizer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 230px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 5px;
      padding: 0 16px;
      z-index: 2;
      opacity: 0.35;
    }
    .bar {
      flex: 1;
      max-width: 22px;
      border-radius: 3px 3px 0 0;
      animation: pulse 0.8s ease-in-out infinite;
    }
    .bar:nth-child(odd)  { background: linear-gradient(to top, var(--pink),   var(--yellow)); }
    .bar:nth-child(even) { background: linear-gradient(to top, var(--cyan),   var(--pink));  }
    .bar:nth-child(3n)   { background: linear-gradient(to top, var(--yellow), var(--cyan));  }

    .bar:nth-child(1)  { animation-delay: 0.00s; } .bar:nth-child(2)  { animation-delay: 0.09s; }
    .bar:nth-child(3)  { animation-delay: 0.18s; } .bar:nth-child(4)  { animation-delay: 0.27s; }
    .bar:nth-child(5)  { animation-delay: 0.36s; } .bar:nth-child(6)  { animation-delay: 0.45s; }
    .bar:nth-child(7)  { animation-delay: 0.54s; } .bar:nth-child(8)  { animation-delay: 0.45s; }
    .bar:nth-child(9)  { animation-delay: 0.36s; } .bar:nth-child(10) { animation-delay: 0.27s; }
    .bar:nth-child(11) { animation-delay: 0.18s; } .bar:nth-child(12) { animation-delay: 0.09s; }
    .bar:nth-child(13) { animation-delay: 0.00s; } .bar:nth-child(14) { animation-delay: 0.09s; }
    .bar:nth-child(15) { animation-delay: 0.18s; } .bar:nth-child(16) { animation-delay: 0.27s; }
    .bar:nth-child(17) { animation-delay: 0.36s; } .bar:nth-child(18) { animation-delay: 0.27s; }
    .bar:nth-child(19) { animation-delay: 0.18s; } .bar:nth-child(20) { animation-delay: 0.09s; }

    @keyframes pulse {
      0%, 100% { height: 12px; }
      50%       { height: 190px; }
    }

    /* ── Content ─────────────────────────────────────────────── */
    .content {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px 100px;
      text-align: center;
    }

    /* NOW PLAYING label */
    .now-playing {
      font-size: 8px;
      letter-spacing: 5px;
      color: var(--cyan);
      text-shadow: 0 0 12px var(--cyan);
      margin-bottom: 28px;
      animation: fadeUp 0.8s ease 0.1s both, flicker 6s 4s infinite;
    }

    /* DJ prefix */
    .dj-tag {
      font-size: clamp(9px, 1.8vw, 13px);
      letter-spacing: 12px;
      color: var(--pink);
      text-shadow: 0 0 18px var(--pink);
      margin-bottom: 6px;
      animation: fadeUp 0.8s ease 0.25s both;
    }

    /* Main title */
    h1 {
      font-size: clamp(36px, 9vw, 80px);
      letter-spacing: 3px;
      line-height: 1.05;
      color: var(--yellow);
      text-shadow:
        0 0 18px var(--yellow),
        0 0 45px rgba(245,255,0,0.45),
        5px 5px 0 var(--pink);
      animation: fadeUp 0.8s ease 0.4s both, glitch 5s 2s infinite;
      margin-bottom: 0;
    }

    @keyframes glitch {
      0%, 88%, 100% {
        text-shadow: 0 0 18px var(--yellow), 0 0 45px rgba(245,255,0,0.45), 5px 5px 0 var(--pink);
        transform: translate(0);
      }
      89.5% { text-shadow: -4px 0 var(--cyan), 4px 0 var(--pink); transform: translate(-3px, 1px); }
      91%   { text-shadow:  4px 0 var(--cyan),-4px 0 var(--pink); transform: translate( 3px,-1px); }
      92.5% {
        text-shadow: 0 0 18px var(--yellow), 0 0 45px rgba(245,255,0,0.45), 5px 5px 0 var(--pink);
        transform: translate(0);
      }
    }

    /* Divider */
    .divider {
      width: min(420px, 90vw);
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--pink) 20%, var(--yellow) 50%, var(--cyan) 80%, transparent);
      margin: 22px auto 18px;
      animation: fadeUp 0.8s ease 0.55s both;
    }

    /* Tagline */
    .tagline {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(11px, 2vw, 15px);
      letter-spacing: 8px;
      color: var(--cyan);
      text-shadow: 0 0 10px var(--cyan);
      margin-bottom: 52px;
      animation: fadeUp 0.8s ease 0.65s both;
    }

    /* Watch label */
    .watch-label {
      font-size: 7px;
      letter-spacing: 5px;
      color: var(--pink);
      text-shadow: 0 0 8px var(--pink);
      margin-bottom: 14px;
      animation: fadeUp 0.8s ease 0.8s both, flicker 4s 3s infinite;
    }

    /* YouTube button */
    .yt-btn {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      padding: 22px 48px;
      border: 2px solid var(--yellow);
      color: var(--yellow);
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      letter-spacing: 4px;
      overflow: hidden;
      transition: color 0.15s ease;
      animation: fadeUp 0.8s ease 0.95s both;
      box-shadow:
        0 0 18px rgba(245,255,0,0.25),
        inset 0 0 18px rgba(245,255,0,0.04);
      -webkit-tap-highlight-color: transparent;
    }

    .yt-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--yellow);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.18s ease;
    }

    .yt-btn:hover { color: #000; box-shadow: 0 0 50px rgba(245,255,0,0.75); }
    .yt-btn:hover::before { transform: scaleX(1); }
    .yt-btn:active { transform: scale(0.96); }

    .yt-btn span { position: relative; z-index: 1; }
    .yt-icon { font-size: 30px; }

    /* ── Animations ──────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes flicker {
      0%, 96%, 100% { opacity: 1; }
      97%           { opacity: 0.25; }
      98.5%         { opacity: 1; }
      99.5%         { opacity: 0.4; }
    }

    /* ── Meteor stencil ──────────────────────────────────────── */
    .meteor-wrap {
      position: fixed;
      top: 0; left: 0;
      width: 160px;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      will-change: transform, opacity;
    }
    .meteor-wrap svg {
      width: 100%;
      height: auto;
      display: block;
    }
    #meteor-tail {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 4;
      pointer-events: none;
    }

  </style>
</head>

  <div class="content">
    <p class="now-playing">▶ NOW PLAYING ◀</p>
    <h1>QUICK SNIFF</h1>
    <div class="divider"></div>
    <p class="tagline">BEATS · BASS · ENERGY</p>
    <p class="watch-label">▶ WATCH THE SETS ◀</p>
    <a href="https://www.youtube.com/@QuickSniff" target="_blank" class="yt-btn">
      <span class="yt-icon">▶</span>
      <span>YOUTUBE</span>
    </a>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const COLORS = ['#f5ff00','#ff00cc','#00ffee','#ffffff','#ffffff'];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const stars = Array.from({ length: 140 }, () => ({
      x:     Math.random() * window.innerWidth,
      y:     Math.random() * window.innerHeight,
      r:     Math.random() * 1.8 + 0.4,
      speed: Math.random() * 0.25 + 0.05,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      base:  Math.random() * 0.6 + 0.25,
      freq:  Math.random() * 0.03 + 0.008,
      phase: Math.random() * Math.PI * 2,
    }));

    let t = 0;
    (function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      t += 0.016;
      stars.forEach(s => {
        ctx.globalAlpha = s.base * (0.55 + 0.45 * Math.sin(t / s.freq + s.phase));
        ctx.fillStyle = s.color;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
        s.y -= s.speed;
        if (s.y < -4) { s.y = canvas.height + 4; s.x = Math.random() * canvas.width; }
      });
      ctx.globalAlpha = 1;
      requestAnimationFrame(draw);
    })();


    // ── Meteor JS engine ─────────────────────────────────────
    const meteorEl = document.getElementById('meteor');
    const tailCanvas = document.getElementById('meteor-tail');
    const tc = tailCanvas.getContext('2d');

    function resizeTail() {
      tailCanvas.width  = window.innerWidth;
      tailCanvas.height = window.innerHeight;
    }
    resizeTail();
    window.addEventListener('resize', resizeTail);

    // Palette colors
    const PALETTE = ['#f5ff00', '#ff00cc', '#00ffee'];

    // Each "run" definition: from which edge, trajectory angle, color tint
    const RUNS = [
      { fromEdge: 'top-right',   angleDeg:  38, color: '#f5ff00', glow: '#ff00cc' },
      { fromEdge: 'top-left',    angleDeg: -38, color: '#00ffee', glow: '#f5ff00' },
      { fromEdge: 'top-right',   angleDeg:  55, color: '#ff00cc', glow: '#00ffee' },
      { fromEdge: 'top-left',    angleDeg: -28, color: '#f5ff00', glow: '#00ffee' },
      { fromEdge: 'top-right',   angleDeg:  22, color: '#00ffee', glow: '#ff00cc' },
      { fromEdge: 'top-left',    angleDeg: -50, color: '#ff00cc', glow: '#f5ff00' },
    ];
    // Shuffle helper
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    let runQueue = shuffle([...RUNS]);
    let runIndex = 0;

    function nextRun() {
      runIndex++;
      if (runIndex >= runQueue.length) {
        runQueue = shuffle([...RUNS]);
        runIndex = 0;
      }
      const delay = 4000 + Math.random() * 5000; // 4-9s gap between runs
      setTimeout(fireMeteor, delay);
    }

    function fireMeteor() {
      const run = runQueue[runIndex];
      const W = window.innerWidth;
      const H = window.innerHeight;
      const dur = 2600 + Math.random() * 800; // travel duration ms
      const rad = run.angleDeg * Math.PI / 180;

      // Start position: off-screen
      let startX, startY, endX, endY;
      const overshot = 240; // how far off-screen to start
      const travel = Math.max(W, H) * 1.4;

      if (run.fromEdge === 'top-right') {
        startX = W + overshot;
        startY = -overshot - 80;
        endX = startX - Math.cos(rad) * travel;
        endY = startY + Math.sin(rad) * travel;
      } else {
        startX = -overshot - 80;
        startY = -overshot - 80;
        const absRad = Math.abs(rad);
        endX = startX + Math.cos(absRad) * travel;
        endY = startY + Math.sin(absRad) * travel;
      }

      // Apply color tint to svg
      meteorEl.querySelector('svg').style.color = run.color;
      meteorEl.style.filter =
        `drop-shadow(0 0 16px ${run.color}) drop-shadow(0 0 40px ${run.glow})`;

      // Rotate to match trajectory
      const rotDeg = run.angleDeg;

      let startTime = null;
      let tailPoints = [];

      function animFrame(ts) {
        if (!startTime) startTime = ts;
        const elapsed = ts - startTime;
        const progress = Math.min(elapsed / dur, 1);
        // Ease: fast start, gentle slowdown
        const eased = 1 - Math.pow(1 - progress, 2.2);

        const cx = startX + (endX - startX) * eased;
        const cy = startY + (endY - startY) * eased;

        // Fade in/out envelope
        let alpha;
        if (progress < 0.06)       alpha = progress / 0.06;
        else if (progress > 0.78)  alpha = (1 - progress) / 0.22;
        else                        alpha = 1;
        alpha = Math.min(alpha, 1) * 0.85;

        // Position the stencil
        meteorEl.style.transform = `translate(${cx}px, ${cy}px) rotate(${rotDeg}deg) scale(${0.7 + eased * 0.35})`;
        meteorEl.style.opacity   = alpha;

        // Draw tail on canvas
        tailPoints.push({ x: cx + 80, y: cy + 80, a: alpha });
        if (tailPoints.length > 28) tailPoints.shift();

        tc.clearRect(0, 0, tailCanvas.width, tailCanvas.height);
        if (tailPoints.length > 2) {
          for (let i = 1; i < tailPoints.length; i++) {
            const p0 = tailPoints[i - 1];
            const p1 = tailPoints[i];
            const frac = i / tailPoints.length;
            const lineAlpha = frac * p1.a * 0.7;
            const lw = frac * 9;
            const grad = tc.createLinearGradient(p0.x, p0.y, p1.x, p1.y);
            grad.addColorStop(0, hexAlpha(run.glow, lineAlpha * 0.4));
            grad.addColorStop(1, hexAlpha(run.color, lineAlpha));
            tc.beginPath();
            tc.moveTo(p0.x, p0.y);
            tc.lineTo(p1.x, p1.y);
            tc.strokeStyle = grad;
            tc.lineWidth   = lw;
            tc.lineCap     = 'round';
            tc.stroke();
          }
        }

        if (progress < 1) {
          requestAnimationFrame(animFrame);
        } else {
          // Hide and queue next
          meteorEl.style.opacity = '0';
          tc.clearRect(0, 0, tailCanvas.width, tailCanvas.height);
          nextRun();
        }
      }

      requestAnimationFrame(animFrame);
    }

    function hexAlpha(hex, a) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${Math.max(0,Math.min(1,a))})`;
    }

    // Kick off first meteor after short delay
    setTimeout(fireMeteor, 1800);

  </script>
